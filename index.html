<style>
  :root {
    --cream: #f3ebe4;
    --ink: #3a2a28;
    --muted: #9c8278;
    --accent: #bd8a7c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: "Cormorant Garamond", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .stage {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(48px, 9vh, 120px);
    padding: clamp(28px, 6vw, 80px);
  }

  /* ---- Racket (horizontal, detoured, on top) --------------------------- */
  .panel {
    --w: min(76vw, 58vh, 660px);
    width: var(--w);
    height: calc(var(--w) * 0.234);
    position: relative;
    overflow: visible;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .shot {
    height: var(--w);
    width: auto;
    object-fit: contain;
    transform: rotate(-90deg);
    transition: filter 900ms cubic-bezier(.22,.61,.36,1), transform 900ms cubic-bezier(.22,.61,.36,1);
    will-change: filter, transform;
  }

  /* ---- Content --------------------------------------------------------- */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(20px, 3.5vh, 44px);
  }
  .countdown {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    height: 119px;
  }
  .unit { display: flex; flex-direction: column; align-items: center; }
  .num {
    font-weight: 300;
    font-size: clamp(40px, 7.4vw, 104px);
    line-height: 0.92;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .lab {
    font-family: "Archivo", sans-serif;
    font-size: clamp(9px, 0.85vw, 12px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.85em;
  }
  .sep {
    font-weight: 300;
    font-size: clamp(34px, 6vw, 84px);
    line-height: 1;
    color: var(--accent);
    opacity: 0.55;
    transform: translateY(-0.12em);
  }
  .caption {
    font-style: italic;
    font-size: clamp(17px, 1.7vw, 24px);
    color: var(--muted);
    max-width: 34ch;
    white-space: pre-line;
    text-wrap: pretty;
  }
  .headline {
    font-weight: 300;
    font-style: italic;
    font-size: clamp(64px, 13vw, 168px);
    line-height: 0.88;
    color: var(--ink);
  }

  @media (max-width: 640px) {
    .num { font-size: clamp(34px, 13vw, 72px); }
    .countdown { gap: 14px; }
  }
  @media (max-width: 380px) {
    .sep { display: none; }
  }
</style>
</head>

      <div class="countdown" id="countdown" role="timer" aria-live="off">
        <div class="unit"><span class="num" id="d">00</span><span class="lab">d</span></div>
        <span class="sep">:</span>
        <div class="unit"><span class="num" id="h">00</span><span class="lab">h</span></div>
        <span class="sep">:</span>
        <div class="unit"><span class="num" id="m">00</span><span class="lab">m</span></div>
        <span class="sep">:</span>
        <div class="unit"><span class="num" id="s">00</span><span class="lab">s</span></div>
      </div>
      <p class="caption" id="caption">Jamais vu un retard pareil déso
C'est un peu plus net chaque jour, essaye de deviner ce que c'est en attendant 👀</p>
    </div>
  </div>

  <script>
    (function () {
      var START = new Date(2026, 5, 11, 0, 0, 0); // 11 juin 2026
      var END   = new Date(2026, 5, 29, 0, 0, 0); // 29 juin 2026
      var DAY = 86400000;
      var TOTAL_DAYS = Math.round((END - START) / DAY); // 18
      var MAX_BLUR = 16;

      var shot = document.getElementById('shot');
      var countdown = document.getElementById('countdown');
      var content = document.querySelector('.content');
      var caption = document.getElementById('caption');
      var els = { d: document.getElementById('d'), h: document.getElementById('h'), m: document.getElementById('m'), s: document.getElementById('s') };

      function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

      function blurFor(now) {
        if (now >= END) return 0;
        if (now <= START) return MAX_BLUR;
        var days = Math.floor((now - START) / DAY);
        return MAX_BLUR * (1 - days / TOTAL_DAYS);
      }

      function render() {
        var now = new Date();
        var b = blurFor(now);
        shot.style.filter = 'blur(' + b + 'px)';
        shot.style.transform = 'rotate(-90deg) scale(' + (1 + b / 120) + ')';

        if (now >= END) {
          countdown.style.display = 'none';
          if (caption) caption.style.display = 'none';
          if (!document.getElementById('done-msg')) {
            var h1 = document.createElement('h1');
            h1.className = 'headline';
            h1.id = 'done-msg';
            h1.textContent = "c'est l'heure.";
            content.appendChild(h1);
          }
          return;
        }

        var ms = Math.max(0, END - now);
        var d = Math.floor(ms / DAY); ms -= d * DAY;
        var h = Math.floor(ms / 3600000); ms -= h * 3600000;
        var m = Math.floor(ms / 60000); ms -= m * 60000;
        var s = Math.floor(ms / 1000);
        els.d.textContent = pad(d);
        els.h.textContent = pad(h);
        els.m.textContent = pad(m);
        els.s.textContent = pad(s);
      }

      render();
      setInterval(render, 1000);
    })();
  </script>
